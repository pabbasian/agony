<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Owl - Retro Side-Scroller</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            touch-action: none; /* Prevent browser zooming/scrolling */
            font-family: 'Press Start 2P', cursive;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            image-rendering: pixelated; /* Crisp pixels */
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-top {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            text-shadow: 2px 2px 0 #000;
            font-size: 16px;
        }
        .bar-container {
            width: 150px;
            height: 10px;
            background: #333;
            border: 2px solid #fff;
            margin-top: 5px;
            position: relative;
        }
        .bar-fill {
            height: 100%;
            transition: width 0.1s;
        }
        #health-bar { background: #e74c3c; width: 100%; }
        #magic-bar { background: #3498db; width: 100%; }
        
        /* Touch Controls */
        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            height: 150px;
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            opacity: 0.6;
        }
        .touch-zone {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.5);
            font-size: 10px;
            text-align: center;
        }
        #stick-knob {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: absolute;
            transform: translate(0, 0);
            pointer-events: none;
        }
        #fire-btn {
            background: rgba(231, 76, 60, 0.5);
            border: 2px solid #e74c3c;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        #fire-btn:active {
            background: rgba(231, 76, 60, 0.8);
        }
        
        /* Menus */
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 10;
            color: white;
            text-align: center;
        }
        h1 {
            color: #f1c40f;
            text-shadow: 4px 4px 0 #c0392b;
            font-size: 40px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        button {
            background: #e74c3c;
            border: 4px solid #c0392b;
            color: white;
            font-family: 'Press Start 2P', cursive;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            text-transform: uppercase;
        }
        button:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }
        .hidden { display: none !important; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* CRT Effect Overlay */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 999;
        }
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 998;
        }
    </style>
</head>
<body>

    <!-- CRT Effects -->
    <div class="crt-overlay"></div>
    <div class="vignette"></div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- UI Layer -->
    <div id="ui-layer">
        <div class="hud-top">
            <div>
                <div>HEALTH</div>
                <div class="bar-container"><div id="health-bar" class="bar-fill"></div></div>
            </div>
            <div style="text-align: right;">
                <div>SCORE: <span id="score-display">0</span></div>
                <div style="margin-top:5px; font-size: 12px; color: #aaa;">DIST: <span id="dist-display">0</span>m</div>
            </div>
        </div>
        
        <!-- Mobile Controls -->
        <div id="controls">
            <div id="stick-zone" class="touch-zone">
                MOVE
                <div id="stick-knob"></div>
            </div>
            <div id="fire-btn" class="touch-zone">FIRE</div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="menu-screen">
        <h1>AETHER OWL</h1>
        <p style="margin-bottom: 30px; line-height: 1.5; font-size: 12px; color: #ccc;">
            DESKTOP: Arrows/WASD to Move, SPACE to Shoot<br>
            MOBILE: Left Stick to Move, Right Button to Shoot
        </p>
        <button id="start-btn">START JOURNEY</button>
        <button id="music-toggle">MUSIC: OFF</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="menu-screen hidden">
        <h1 style="color: #e74c3c;">GAME OVER</h1>
        <p>SCORE: <span id="final-score">0</span></p>
        <button id="restart-btn">TRY AGAIN</button>
        <button id="menu-btn">MAIN MENU</button>
    </div>

<script>
/**
 * AETHER OWL - Side Scrolling Platformer
 * Mobile First, Retro Style
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game State
let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
let score = 0;
let distance = 0;
let frameCount = 0;
let gameSpeed = 3;
let isMusicOn = false;

// Input State
const input = {
    x: 0, // -1 to 1
    y: 0, // -1 to 1
    shoot: false,
    keys: {}
};

// Entities
let player;
let projectiles = [];
let enemies = [];
let particles = [];
let terrain = [];

// Audio Context
let audioCtx;
let musicInterval;

// Resize Handling
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- INPUT HANDLING (Hybrid: Keyboard + Touch + Mouse) ---

// Keyboard
window.addEventListener('keydown', e => {
    input.keys[e.code] = true;
    if (e.code === 'Space') input.shoot = true;
});
window.addEventListener('keyup', e => {
    input.keys[e.code] = false;
    if (e.code === 'Space') input.shoot = false;
});

// Touch / Mouse for Virtual Joystick
const stickZone = document.getElementById('stick-zone');
const stickKnob = document.getElementById('stick-knob');
const fireBtn = document.getElementById('fire-btn');

let stickTouchId = null;
let stickCenter = { x: 0, y: 0 };

// Helper to get touch/mouse pos relative to element
function getPos(e, elem) {
    const rect = elem.getBoundingClientRect();
    let clientX, clientY;
    
    if (e.touches) {
        // Find the specific touch if we have an ID, or just the first one
        const touch = stickTouchId !== null 
            ? Array.from(e.touches).find(t => t.identifier === stickTouchId) 
            : e.touches[0];
        if (!touch) return null;
        clientX = touch.clientX;
        clientY = touch.clientY;
    } else {
        clientX = e.clientX;
        clientY = e.clientY;
    }
    
    return {
        x: clientX - rect.left - rect.width / 2,
        y: clientY - rect.top - rect.height / 2,
        centerX: rect.left + rect.width / 2,
        centerY: rect.top + rect.height / 2
    };
}

function handleStickStart(e) {
    e.preventDefault();
    if (stickTouchId !== null) return;
    
    const touch = e.changedTouches ? e.changedTouches[0] : e;
    stickTouchId = touch.identifier || 'mouse';
    
    const rect = stickZone.getBoundingClientRect();
    stickCenter = {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
    };
    
    handleStickMove(e);
}

function handleStickMove(e) {
    e.preventDefault();
    if (stickTouchId === null) return;
    
    const pos = getPos(e, stickZone);
    if (!pos) return;

    const maxDist = 60; // Max radius
    let dx = pos.x;
    let dy = pos.y;
    
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    // Normalize
    if (dist > maxDist) {
        dx = (dx / dist) * maxDist;
        dy = (dy / dist) * maxDist;
    }
    
    // Visual update
    stickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    
    // Input update (-1 to 1)
    input.x = dx / maxDist;
    input.y = dy / maxDist;
}

function handleStickEnd(e) {
    e.preventDefault();
    const touch = e.changedTouches ? e.changedTouches[0] : e;
    if ((touch.identifier || 'mouse') === stickTouchId) {
        stickTouchId = null;
        input.x = 0;
        input.y = 0;
        stickKnob.style.transform = `translate(0px, 0px)`;
    }
}

// Fire Button
function handleFireStart(e) {
    e.preventDefault();
    input.shoot = true;
    fireBtn.style.background = 'rgba(231, 76, 60, 0.8)';
    fireBtn.style.transform = 'scale(0.95)';
}
function handleFireEnd(e) {
    e.preventDefault();
    input.shoot = false;
    fireBtn.style.background = 'rgba(231, 76, 60, 0.5)';
    fireBtn.style.transform = 'scale(1)';
}

// Event Listeners for Touch
stickZone.addEventListener('touchstart', handleStickStart, {passive: false});
stickZone.addEventListener('touchmove', handleStickMove, {passive: false});
stickZone.addEventListener('touchend', handleStickEnd, {passive: false});
stickZone.addEventListener('touchcancel', handleStickEnd, {passive: false});

fireBtn.addEventListener('touchstart', handleFireStart, {passive: false});
fireBtn.addEventListener('touchend', handleFireEnd, {passive: false});

// Event Listeners for Mouse (Desktop fallback for touch zones)
stickZone.addEventListener('mousedown', handleStickStart);
window.addEventListener('mousemove', handleStickMove);
window.addEventListener('mouseup', handleStickEnd);

fireBtn.addEventListener('mousedown', handleFireStart);
fireBtn.addEventListener('mouseup', handleFireEnd);


// --- AUDIO SYSTEM (Chiptune) ---
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playTone(freq, type, duration, vol = 0.1) {
    if (!audioCtx || !isMusicOn) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function playShootSound() {
    if (!audioCtx || !isMusicOn) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
}

function playExplosionSound() {
    if (!audioCtx || !isMusicOn) return;
    const bufferSize = audioCtx.sampleRate * 0.2;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    noise.connect(gain);
    gain.connect(audioCtx.destination);
    noise.start();
}

// Simple Agony-inspired melody loop
function startMusic() {
    if (musicInterval) clearInterval(musicInterval);
    let noteIndex = 0;
    // E Minor arpeggio inspired pattern
    const melody = [
        329.63, 0, 392.00, 0, 493.88, 0, 659.25, 0, // E4, G4, B4, E5
        493.88, 0, 392.00, 0, 329.63, 0, 261.63, 0, // B4, G4, E4, C4
        246.94, 0, 329.63, 0, 415.30, 0, 493.88, 0, // B3, E4, G#4, B4
        415.30, 0, 329.63, 0, 246.94, 0, 164.81     // G#4, E4, B3, E3
    ];
    
    musicInterval = setInterval(() => {
        if (!isMusicOn) return;
        const freq = melody[noteIndex % melody.length];
        if (freq > 0) {
            playTone(freq, 'square', 0.1, 0.05);
            // Bass note every 4th
            if (noteIndex % 4 === 0) playTone(82.41, 'triangle', 0.2, 0.1);
        }
        noteIndex++;
    }, 125); // 120 BPM approx
}

document.getElementById('music-toggle').addEventListener('click', (e) => {
    e.stopPropagation();
    initAudio();
    isMusicOn = !isMusicOn;
    e.target.innerText = isMusicOn ? "MUSIC: ON" : "MUSIC: OFF";
    if (isMusicOn) startMusic();
    else clearInterval(musicInterval);
});


// --- GAME CLASSES ---

class Player {
    constructor() {
        this.x = 100;
        this.y = canvas.height / 2;
        this.width = 40;
        this.height = 30;
        this.vx = 0;
        this.vy = 0;
        this.speed = 5;
        this.health = 100;
        this.maxHealth = 100;
        this.color = '#f1c40f';
        this.wingFrame = 0;
    }

    update() {
        // Keyboard Input Override
        let kx = 0, ky = 0;
        if (input.keys['ArrowUp'] || input.keys['KeyW']) ky = -1;
        if (input.keys['ArrowDown'] || input.keys['KeyS']) ky = 1;
        if (input.keys['ArrowLeft'] || input.keys['KeyA']) kx = -1;
        if (input.keys['ArrowRight'] || input.keys['KeyD']) kx = 1;

        // Combine Touch and Keyboard (Keyboard takes priority if pressed)
        const moveX = kx !== 0 ? kx : input.x;
        const moveY = ky !== 0 ? ky : input.y;

        this.x += moveX * this.speed;
        this.y += moveY * this.speed;

        // Boundaries
        if (this.x < 0) this.x = 0;
        if (this.x > canvas.width * 0.3) this.x = canvas.width * 0.3; // Limit forward movement
        if (this.y < 0) this.y = 0;
        if (this.y > canvas.height - this.height) this.y = canvas.height - this.height;

        // Shooting
        if (input.shoot && frameCount % 10 === 0) {
            projectiles.push(new Projectile(this.x + this.width, this.y + this.height/2));
            playShootSound();
            // Haptic
            if (navigator.vibrate) navigator.vibrate(10);
        }

        this.wingFrame++;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Pixel Art Owl Procedural
        // Body
        ctx.fillStyle = this.color;
        ctx.fillRect(0, 5, 30, 20);
        
        // Head
        ctx.fillRect(5, 0, 20, 15);
        
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.fillRect(10, 5, 5, 5);
        ctx.fillRect(18, 5, 5, 5);
        ctx.fillStyle = '#000';
        ctx.fillRect(12, 7, 2, 2);
        ctx.fillRect(20, 7, 2, 2);

        // Beak
        ctx.fillStyle = '#e67e22';
        ctx.beginPath();
        ctx.moveTo(25, 10);
        ctx.lineTo(35, 12);
        ctx.lineTo(25, 14);
        ctx.fill();

        // Wings (Animated)
        ctx.fillStyle = '#d35400';
        const wingOffset = Math.sin(this.wingFrame * 0.2) * 5;
        ctx.fillRect(-5, 10 + wingOffset, 10, 10);
        
        ctx.restore();
    }
}

class Projectile {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = 6;
        this.speed = 10;
        this.markedForDeletion = false;
    }
    update() {
        this.x += this.speed;
        if (this.x > canvas.width) this.markedForDeletion = true;
    }
    draw() {
        ctx.fillStyle = '#3498db';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#3498db';
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.shadowBlur = 0;
    }
}

class Enemy {
    constructor() {
        this.size = 30 + Math.random() * 20;
        this.x = canvas.width + this.size;
        this.y = Math.random() * (canvas.height - this.size);
        this.speed = (Math.random() * 2 + 2) + (gameSpeed * 0.5);
        this.type = Math.random() > 0.5 ? 'flyer' : 'walker';
        if (this.type === 'walker') {
            this.y = canvas.height - this.size - 10; // Ground level
            this.speed *= 0.8;
        }
        this.markedForDeletion = false;
        this.color = this.type === 'flyer' ? '#9b59b6' : '#2ecc71';
    }
    update() {
        this.x -= this.speed;
        if (this.x < -this.size) this.markedForDeletion = true;
        
        // Collision with Player
        if (
            this.x < player.x + player.width &&
            this.x + this.size > player.x &&
            this.y < player.y + player.height &&
            this.y + this.size > player.y
        ) {
            player.health -= 20;
            this.markedForDeletion = true;
            createParticles(this.x, this.y, '#e74c3c', 10);
            playExplosionSound();
            if (navigator.vibrate) navigator.vibrate(200);
            updateHUD();
            if (player.health <= 0) gameOver();
        }
    }
    draw() {
        ctx.fillStyle = this.color;
        if (this.type === 'flyer') {
            // Bat-like shape
            ctx.beginPath();
            ctx.moveTo(this.x, this.y + this.size/2);
            ctx.lineTo(this.x + this.size, this.y);
            ctx.lineTo(this.x + this.size/2, this.y + this.size/2);
            ctx.lineTo(this.x + this.size, this.y + this.size);
            ctx.fill();
        } else {
            // Slime shape
            ctx.fillRect(this.x, this.y + this.size/2, this.size, this.size/2);
            ctx.beginPath();
            ctx.arc(this.x + this.size/2, this.y + this.size/2, this.size/2, Math.PI, 0);
            ctx.fill();
        }
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = (Math.random() - 0.5) * 5;
        this.life = 1.0;
        this.color = color;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.05;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 4, 4);
        ctx.globalAlpha = 1.0;
    }
}

function createParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
    }
}

// Terrain Generation (Parallax)
let bgOffset = 0;
let mountains = [];
for(let i=0; i<10; i++) mountains.push({x: i*200, h: 100 + Math.random()*100});

function drawBackground() {
    // Sky Gradient
    const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    grad.addColorStop(0, '#2c3e50');
    grad.addColorStop(1, '#4ca1af');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Parallax Mountains
    ctx.fillStyle = '#1a1a2e';
    bgOffset -= 0.5;
    if (bgOffset <= -200) bgOffset = 0;
    
    mountains.forEach(m => {
        let drawX = m.x + bgOffset;
        if (drawX < -200) drawX += 2000;
        
        ctx.beginPath();
        ctx.moveTo(drawX, canvas.height);
        ctx.lineTo(drawX + 100, canvas.height - m.h);
        ctx.lineTo(drawX + 200, canvas.height);
        ctx.fill();
    });

    // Ground
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
    ctx.fillStyle = '#1e8449';
    ctx.fillRect(0, canvas.height - 10, canvas.width, 10);
}

// --- GAME LOOP ---

function initGame() {
    player = new Player();
    projectiles = [];
    enemies = [];
    particles = [];
    score = 0;
    distance = 0;
    gameSpeed = 3;
    frameCount = 0;
    updateHUD();
    gameState = 'PLAYING';
    
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('controls').style.display = 'flex';
    
    animate();
}

function spawnEnemies() {
    if (frameCount % 60 === 0) {
        enemies.push(new Enemy());
    }
}

function checkCollisions() {
    projectiles.forEach(p => {
        enemies.forEach(e => {
            if (!p.markedForDeletion && !e.markedForDeletion &&
                p.x < e.x + e.size && p.x + p.size > e.x &&
                p.y < e.y + e.size && p.y + p.size > e.y) {
                
                e.markedForDeletion = true;
                p.markedForDeletion = true;
                score += 100;
                createParticles(e.x, e.y, e.color, 8);
                playExplosionSound();
                updateHUD();
            }
        });
    });
}

function updateHUD() {
    document.getElementById('health-bar').style.width = `${(player.health / player.maxHealth) * 100}%`;
    document.getElementById('score-display').innerText = score;
    document.getElementById('dist-display').innerText = Math.floor(distance);
}

function gameOver() {
    gameState = 'GAMEOVER';
    document.getElementById('final-score').innerText = score;
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('controls').style.display = 'none';
}

function animate() {
    if (gameState !== 'PLAYING') return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawBackground();
    
    // Update & Draw Player
    player.update();
    player.draw();
    
    // Projectiles
    projectiles.forEach((p, index) => {
        p.update();
        p.draw();
        if (p.markedForDeletion) projectiles.splice(index, 1);
    });
    
    // Enemies
    spawnEnemies();
    enemies.forEach((e, index) => {
        e.update();
        e.draw();
        if (e.markedForDeletion) enemies.splice(index, 1);
    });
    
    // Particles
    particles.forEach((p, index) => {
        p.update();
        p.draw();
        if (p.life <= 0) particles.splice(index, 1);
    });
    
    checkCollisions();
    
    // Progression
    distance += gameSpeed * 0.01;
    if (frameCount % 600 === 0) gameSpeed += 0.5; // Increase speed over time
    
    frameCount++;
    requestAnimationFrame(animate);
}

// UI Buttons
document.getElementById('start-btn').addEventListener('click', () => {
    initAudio();
    initGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
    initGame();
});

document.getElementById('menu-btn').addEventListener('click', () => {
    gameState = 'MENU';
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
    document.getElementById('controls').style.display = 'none';
    
    // Clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
});

// Initial Draw
drawBackground();

</script>
</body>
</html>
