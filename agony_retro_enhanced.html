<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHER OWL: Retro Mobile Shooter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg-color: #050510;
            --ui-color: #00ffcc;
            --danger-color: #ff0055;
            --gold-color: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
            touch-action: none; /* Critical for mobile games */
            user-select: none;
            -webkit-user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* UI Overlays */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            color: white;
            text-shadow: 2px 2px 0 #000;
            font-size: 16px;
        }

        .bars {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 150px;
        }

        .bar-container {
            background: #333;
            border: 2px solid #fff;
            height: 12px;
            position: relative;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.1s;
        }

        #health-bar { background-color: var(--danger-color); width: 100%; }
        #magic-bar { background-color: var(--ui-color); width: 100%; }

        /* Menus */
        .menu-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
            text-align: center;
            color: white;
        }

        .hidden { display: none !important; }

        h1 {
            font-size: 40px;
            color: var(--ui-color);
            text-shadow: 4px 4px 0 #004444;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        p { font-size: 12px; line-height: 1.8; color: #ccc; max-width: 600px; }

        button {
            background: var(--ui-color);
            border: 4px solid #fff;
            color: #000;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            padding: 15px 30px;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 6px 0 #008888;
            transition: transform 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #008888;
        }

        /* Mobile Controls Overlay */
        #mobile-controls {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Let touches pass through to logic */
            z-index: 5;
        }

        .control-zone {
            position: absolute;
            bottom: 20px;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }

        #stick-zone {
            left: 20px;
            width: 120px;
            height: 120px;
        }

        #fire-zone {
            right: 20px;
            width: 100px;
            height: 100px;
            border: none;
        }

        #fire-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 0, 85, 0.5);
            border: 4px solid white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 10px;
            user-select: none;
            pointer-events: auto;
            backdrop-filter: blur(2px);
        }

        #fire-btn.active {
            background: rgba(255, 0, 85, 0.9);
            transform: scale(0.95);
        }

        .joystick-knob {
            width: 50px;
            height: 50px;
            background: rgba(0, 255, 204, 0.5);
            border-radius: 50%;
            position: absolute;
            pointer-events: none;
            transform: translate(0, 0);
            border: 2px solid white;
        }

        /* CRT Effect */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 20;
            opacity: 0.6;
        }
        
        .scanline {
            width: 100%;
            height: 10px;
            background: rgba(255,255,255,0.05);
            position: absolute;
            z-index: 21;
            animation: scan 6s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        #orientation-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            color: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        @media screen and (orientation: portrait) {
            #orientation-warning { display: flex; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="crt-overlay"></div>
    <div class="scanline"></div>

    <!-- HUD -->
    <div class="ui-layer" id="hud">
        <div class="hud-top">
            <div class="bars">
                <div class="bar-container"><div id="health-bar" class="bar-fill"></div></div>
                <div class="bar-container"><div id="magic-bar" class="bar-fill"></div></div>
            </div>
            <div id="score-display">SCORE: 0</div>
        </div>
    </div>

    <!-- Mobile Controls Visuals -->
    <div id="mobile-controls">
        <div id="stick-zone" class="control-zone">
            <div id="joystick-knob" class="joystick-knob"></div>
        </div>
        <div id="fire-zone" class="control-zone">
            <div id="fire-btn">FIRE</div>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="menu-screen">
        <h1>AETHER OWL</h1>
        <p>RETRO MOBILE SHOOTER</p>
        <p style="color: #aaa; margin-top: 20px;">
            DESKTOP: WASD/Arrows to Move, SPACE to Shoot<br>
            MOUSE: Drag Left to Move, Click Right to Shoot<br><br>
            MOBILE: Left Thumb Drag, Right Thumb Tap
        </p>
        <button id="start-btn">START JOURNEY</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="menu-screen hidden">
        <h1 style="color: var(--danger-color)">GAME OVER</h1>
        <p id="final-score">SCORE: 0</p>
        <button id="restart-btn">TRY AGAIN</button>
    </div>

    <!-- Orientation Warning -->
    <div id="orientation-warning">
        <h1>ROTATE DEVICE</h1>
        <p>Please play in Landscape mode for the best experience.</p>
    </div>
</div>

<script>
/**
 * AETHER OWL - Mobile First Engine
 * Completely rewritten input system for 100% reliability
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game State
let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
let score = 0;
let frames = 0;
let lastTime = 0;

// Input State
const input = {
    x: 0,
    y: 0,
    shooting: false,
    active: false
};

// Entities
let player;
let projectiles = [];
let enemies = [];
let particles = [];
let gems = [];

// Audio Context
let audioCtx;
let musicInterval;

// Resize Handling
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    // Keep aspect ratio logical if needed, but for mobile full screen is best
}
window.addEventListener('resize', resize);
resize();

// --- INPUT SYSTEM (THE FIX) ---

function handleMove(x, y) {
    // Normalize input relative to center of screen for movement
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    
    // Deadzone
    const dx = x - centerX;
    const dy = y - centerY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const maxDist = 100;
    
    if (dist > 10) {
        input.active = true;
        input.x = Math.max(-1, Math.min(1, dx / maxDist));
        input.y = Math.max(-1, Math.min(1, dy / maxDist));
    } else {
        input.active = false;
        input.x = 0;
        input.y = 0;
    }
}

function stopMove() {
    input.active = false;
    input.x = 0;
    input.y = 0;
}

function setShooting(isShooting) {
    input.shooting = isShooting;
    if(isShooting) {
        document.getElementById('fire-btn').classList.add('active');
    } else {
        document.getElementById('fire-btn').classList.remove('active');
    }
}

// 1. Keyboard Events
window.addEventListener('keydown', (e) => {
    if (gameState !== 'PLAYING') return;
    switch(e.code) {
        case 'ArrowUp': case 'KeyW': input.y = -1; input.active = true; break;
        case 'ArrowDown': case 'KeyS': input.y = 1; input.active = true; break;
        case 'ArrowLeft': case 'KeyA': input.x = -1; input.active = true; break;
        case 'ArrowRight': case 'KeyD': input.x = 1; input.active = true; break;
        case 'Space': setShooting(true); break;
    }
});

window.addEventListener('keyup', (e) => {
    switch(e.code) {
        case 'ArrowUp': case 'KeyW': if(input.y < 0) input.y = 0; break;
        case 'ArrowDown': case 'KeyS': if(input.y > 0) input.y = 0; break;
        case 'ArrowLeft': case 'KeyA': if(input.x < 0) input.x = 0; break;
        case 'ArrowRight': case 'KeyD': if(input.x > 0) input.x = 0; break;
        case 'Space': setShooting(false); break;
    }
    // Check if all keys released
    if (input.x === 0 && input.y === 0) input.active = false;
});

// 2. Mouse Events (Desktop Hybrid)
let isMouseDown = false;
let mouseMode = null; // 'move' or 'shoot'

canvas.addEventListener('mousedown', (e) => {
    if (gameState !== 'PLAYING') return;
    isMouseDown = true;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (x < canvas.width / 2) {
        mouseMode = 'move';
        handleMove(x, y);
    } else {
        mouseMode = 'shoot';
        setShooting(true);
    }
});

canvas.addEventListener('mousemove', (e) => {
    if (!isMouseDown || mouseMode !== 'move') return;
    const rect = canvas.getBoundingClientRect();
    handleMove(e.clientX - rect.left, e.clientY - rect.top);
});

window.addEventListener('mouseup', () => {
    isMouseDown = false;
    if (mouseMode === 'move') stopMove();
    if (mouseMode === 'shoot') setShooting(false);
    mouseMode = null;
});

// 3. Touch Events (Mobile Native)
const stickZone = document.getElementById('stick-zone');
const fireBtn = document.getElementById('fire-btn');
const knob = document.getElementById('joystick-knob');

let touchIdMove = null;
let touchIdShoot = null;
let stickCenterX, stickCenterY;

stickZone.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (gameState !== 'PLAYING') return;
    const touch = e.changedTouches[0];
    touchIdMove = touch.identifier;
    
    const rect = stickZone.getBoundingClientRect();
    stickCenterX = rect.left + rect.width / 2;
    stickCenterY = rect.top + rect.height / 2;
    
    updateJoystick(touch.clientX, touch.clientY);
}, {passive: false});

stickZone.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (touchIdMove === null) return;
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === touchIdMove) {
            updateJoystick(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
            break;
        }
    }
}, {passive: false});

stickZone.addEventListener('touchend', (e) => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
        if (e.changedTouches[i].identifier === touchIdMove) {
            touchIdMove = null;
            stopMove();
            knob.style.transform = `translate(0px, 0px)`;
            break;
        }
    }
}, {passive: false});

function updateJoystick(clientX, clientY) {
    const maxDist = 40; // Visual limit
    let dx = clientX - stickCenterX;
    let dy = clientY - stickCenterY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    // Visual Update
    if (dist > maxDist) {
        const ratio = maxDist / dist;
        dx *= ratio;
        dy *= ratio;
    }
    knob.style.transform = `translate(${dx}px, ${dy}px)`;

    // Game Input Update (Normalized -1 to 1)
    input.active = true;
    input.x = dx / maxDist;
    input.y = dy / maxDist;
}

fireBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (gameState !== 'PLAYING') return;
    touchIdShoot = e.changedTouches[0].identifier;
    setShooting(true);
    if(navigator.vibrate) navigator.vibrate(20);
}, {passive: false});

fireBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    setShooting(false);
}, {passive: false});


// --- AUDIO SYSTEM ---

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    startMusic();
}

function playSound(type) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const now = audioCtx.currentTime;
    
    if (type === 'shoot') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    } else if (type === 'hit') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.linearRampToValueAtTime(50, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    } else if (type === 'collect') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.linearRampToValueAtTime(1200, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    }
}

function startMusic() {
    if (musicInterval) clearInterval(musicInterval);
    // Simple Agony-inspired bassline in E minor
    const notes = [82.41, 82.41, 98.00, 82.41, 73.42, 82.41, 65.41, 73.42]; 
    let noteIdx = 0;
    
    musicInterval = setInterval(() => {
        if (!audioCtx || gameState === 'MENU') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'triangle';
        osc.frequency.value = notes[noteIdx % notes.length];
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
        noteIdx++;
    }, 250);
}


// --- GAME LOGIC ---

class Player {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.radius = 20;
        this.speed = 6;
        this.color = '#00ffcc';
        this.health = 100;
        this.maxHealth = 100;
        this.magic = 100;
        this.maxMagic = 100;
        this.lastShot = 0;
        this.shootDelay = 150; // ms
    }

    update(dt) {
        // Movement
        if (input.active) {
            this.x += input.x * this.speed;
            this.y += input.y * this.speed;
        }

        // Boundaries
        this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

        // Shooting
        if (input.shooting && this.magic > 5) {
            const now = Date.now();
            if (now - this.lastShot > this.shootDelay) {
                this.shoot();
                this.lastShot = now;
                this.magic -= 2;
            }
        }

        // Regen Magic
        if (!input.shooting && this.magic < this.maxMagic) {
            this.magic += 0.2;
        }

        // Update UI
        document.getElementById('health-bar').style.width = `${(this.health / this.maxHealth) * 100}%`;
        document.getElementById('magic-bar').style.width = `${(this.magic / this.maxMagic) * 100}%`;
    }

    shoot() {
        projectiles.push(new Projectile(this.x, this.y - 20));
        playSound('shoot');
        // Haptic
        if(navigator.vibrate) navigator.vibrate(10);
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Glow
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        
        // Body
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        
        // Eyes
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.arc(-8, -5, 6, 0, Math.PI * 2);
        ctx.arc(8, -5, 6, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(-8 + input.x*2, -5, 2, 0, Math.PI * 2);
        ctx.arc(8 + input.x*2, -5, 2, 0, Math.PI * 2);
        ctx.fill();

        // Wings (Animated)
        ctx.fillStyle = '#00aa88';
        const wingOffset = Math.sin(frames * 0.2) * 10;
        ctx.beginPath();
        ctx.ellipse(-25, 0, 15, 8, Math.PI / 4, 0, Math.PI * 2);
        ctx.ellipse(25, 0, 15, 8, -Math.PI / 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
    }
}

class Projectile {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.speed = 12;
        this.radius = 4;
        this.markedForDeletion = false;
    }
    update() {
        this.y -= this.speed;
        if (this.y < 0) this.markedForDeletion = true;
    }
    draw() {
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#00ffcc';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Enemy {
    constructor() {
        this.radius = 25;
        this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
        this.y = -this.radius;
        this.speed = Math.random() * 2 + 1;
        this.health = 3;
        this.markedForDeletion = false;
        this.color = '#ff0055';
        this.angle = 0;
    }
    update() {
        this.y += this.speed;
        this.x += Math.sin(this.angle) * 2;
        this.angle += 0.05;
        
        if (this.y > canvas.height + this.radius) this.markedForDeletion = true;
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        
        // Spiky shape
        ctx.beginPath();
        for(let i=0; i<8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const r = (i % 2 === 0) ? this.radius : this.radius/2;
            ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
        }
        ctx.closePath();
        ctx.fill();
        
        // Evil Eye
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(0, 0, 8, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(0, 0, 3, 0, Math.PI*2);
        ctx.fill();
        
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 8;
        this.vy = (Math.random() - 0.5) * 8;
        this.life = 1.0;
        this.color = color;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= 0.03;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 4, 4);
        ctx.globalAlpha = 1.0;
    }
}

class Gem {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vy = 2;
        this.markedForDeletion = false;
    }
    update() {
        this.y += this.vy;
        // Magnet effect near player
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 100) {
            this.x += dx * 0.05;
            this.y += dy * 0.05;
        }
        if(this.y > canvas.height) this.markedForDeletion = true;
    }
    draw() {
        ctx.fillStyle = '#ffd700';
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#ffd700';
        ctx.beginPath();
        ctx.moveTo(this.x, this.y - 10);
        ctx.lineTo(this.x + 8, this.y);
        ctx.lineTo(this.x, this.y + 10);
        ctx.lineTo(this.x - 8, this.y);
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function spawnEnemy() {
    if (frames % 60 === 0) { // Every second approx
        enemies.push(new Enemy());
    }
}

function checkCollisions() {
    // Projectiles vs Enemies
    projectiles.forEach(proj => {
        enemies.forEach(enemy => {
            const dx = proj.x - enemy.x;
            const dy = proj.y - enemy.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < proj.radius + enemy.radius) {
                proj.markedForDeletion = true;
                enemy.health--;
                playSound('hit');
                if (enemy.health <= 0) {
                    enemy.markedForDeletion = true;
                    score += 100;
                    document.getElementById('score-display').innerText = `SCORE: ${score}`;
                    // Explosion
                    for(let i=0; i<10; i++) particles.push(new Particle(enemy.x, enemy.y, enemy.color));
                    // Drop Gem
                    gems.push(new Gem(enemy.x, enemy.y));
                }
            }
        });
    });

    // Player vs Enemies
    enemies.forEach(enemy => {
        const dx = player.x - enemy.x;
        const dy = player.y - enemy.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < player.radius + enemy.radius) {
            enemy.markedForDeletion = true;
            player.health -= 20;
            playSound('hit');
            if(navigator.vibrate) navigator.vibrate(200);
            // Screen shake effect could go here
            if (player.health <= 0) gameOver();
        }
    });

    // Player vs Gems
    gems.forEach(gem => {
        const dx = player.x - gem.x;
        const dy = player.y - gem.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < player.radius + 15) {
            gem.markedForDeletion = true;
            score += 50;
            player.magic = Math.min(player.maxMagic, player.magic + 10);
            playSound('collect');
            document.getElementById('score-display').innerText = `SCORE: ${score}`;
        }
    });
}

function gameOver() {
    gameState = 'GAMEOVER';
    document.getElementById('game-over-screen').classList.remove('hidden');
    document.getElementById('final-score').innerText = `FINAL SCORE: ${score}`;
    document.getElementById('mobile-controls').style.display = 'none';
}

function resetGame() {
    player = new Player();
    projectiles = [];
    enemies = [];
    particles = [];
    gems = [];
    score = 0;
    frames = 0;
    document.getElementById('score-display').innerText = 'SCORE: 0';
    document.getElementById('game-over-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('mobile-controls').style.display = 'block';
    gameState = 'PLAYING';
    initAudio();
    loop();
}

function loop() {
    if (gameState !== 'PLAYING') return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Background Stars
    ctx.fillStyle = '#fff';
    if(Math.random() > 0.8) {
        ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);
    }

    player.update();
    player.draw();

    projectiles.forEach(p => { p.update(); p.draw(); });
    enemies.forEach(e => { e.update(); e.draw(); });
    particles.forEach(p => { p.update(); p.draw(); });
    gems.forEach(g => { g.update(); g.draw(); });

    // Cleanup
    projectiles = projectiles.filter(p => !p.markedForDeletion);
    enemies = enemies.filter(e => !e.markedForDeletion);
    particles = particles.filter(p => p.life > 0);
    gems = gems.filter(g => !g.markedForDeletion);

    spawnEnemy();
    checkCollisions();

    frames++;
    requestAnimationFrame(loop);
}

// UI Event Listeners
document.getElementById('start-btn').addEventListener('click', () => {
    resetGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
    resetGame();
});

</script>
